<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualLeadGen AI | Executive Dashboard</title>
    <style>
        :root {
            --dark-navy: #0F0F1E;
            --burnt-orange: #E05C1A;
            --light-gray: #B0B0C8;
            --gold: #C9A84C;
            --success: #2ecc71;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-navy);
            color: white;
            margin: 0;
            padding: 2rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(176, 176, 200, 0.2);
            padding-bottom: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid rgba(176, 176, 200, 0.1);
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--gold);
            margin: 0.5rem 0;
        }
        .stat-label {
            color: var(--light-gray);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .dashboard-main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }
        .panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(176, 176, 200, 0.1);
            padding: 1.5rem;
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #000;
            padding: 1rem;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #ccc;
        }
        .log-entry {
            margin-bottom: 0.5rem;
            border-left: 2px solid var(--burnt-orange);
            padding-left: 0.5rem;
        }
        .agent-ALEX { color: #5dade2; }
        .agent-SAM { color: #f4d03f; }
        .agent-DEVIN { color: #af7ac5; }
        .agent-MAX { color: #e67e22; }
        .agent-SYSTEM { color: #58d68d; }
        
        .lead-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
        }
        .lead-item {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(176, 176, 200, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lead-status {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            background: var(--burnt-orange);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; color: var(--gold);">Executive Dashboard</h1>
        <div style="color: var(--light-gray);">System Status: <span style="color: var(--success);">4-AGENT ECOSYSTEM ACTIVE</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Leads Scanned</div>
            <div class="stat-value" id="leads-scanned">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Alex: Outbound Pitches</div>
            <div class="stat-value" id="pitches">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sam: Conversions</div>
            <div class="stat-value" id="conversions">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="revenue">$0</div>
        </div>
    </div>

    <div class="dashboard-main">
        <div class="panel">
            <div class="panel-header">
                Streaming Agent Logs
                <span style="font-size: 0.8rem; color: var(--light-gray);">Alex, Sam, Devin, Max</span>
            </div>
            <div class="log-container" id="agent-logs">
                <div class="log-entry"><span class="agent-SYSTEM">[SYSTEM]</span> Initializing 4-Agent Architecture...</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Recent Leads</div>
            <ul class="lead-list" id="recent-leads">
                <li style="padding: 1rem; text-align: center;">Loading...</li>
            </ul>
        </div>
    </div>

    <script>
        async function fetchAll() {
            try {
                const metricsRes = await fetch('/api/metrics');
                const metrics = await metricsRes.json();
                document.getElementById('leads-scanned').textContent = metrics.leads_scanned;
                document.getElementById('pitches').textContent = metrics.pitches;
                document.getElementById('conversions').textContent = metrics.conversions;
                document.getElementById('revenue').textContent = '$' + metrics.revenue.toLocaleString();

                const logsRes = await fetch('/api/logs');
                const logs = await logsRes.json();
                const logContainer = document.getElementById('agent-logs');
                logContainer.innerHTML = '';
                logs.forEach(log => {
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    const agentClass = 'agent-' + log.agent.toUpperCase();
                    entry.innerHTML = `<span class="${agentClass}">[${log.agent.toUpperCase()}]</span> ${log.message}`;
                    logContainer.appendChild(entry);
                });

                const leadsRes = await fetch('/api/leads/recent');
                const leads = await leadsRes.json();
                const leadList = document.getElementById('recent-leads');
                leadList.innerHTML = '';
                leads.forEach(lead => {
                    const li = document.createElement('li');
                    li.className = 'lead-item';
                    li.innerHTML = `<span>${lead.business_name}</span> <span class="lead-status">${lead.status.toUpperCase()}</span>`;
                    leadList.appendChild(li);
                });

            } catch (err) {
                console.error(err);
            }
        }

        setInterval(fetchAll, 5000);
        fetchAll();
    </script>
</body>
</html>
